<svg width="120" height="32" viewBox="0 0 120 32" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Verak">
  <!-- Orbital mark -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#2D3436" stroke-width="1"/>
  <!-- S-curve connection -->
  <path d="M10,22 C10,13 22,19 22,10" fill="none" stroke="#00A3FF" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M12,23 C13,17 21,15 22,9" fill="none" stroke="#00A3FF" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <!-- Bottom-left node (origin) -->
  <circle cx="10" cy="22" r="3.5" fill="#0B0C10" stroke="#00A3FF" stroke-width="1.8"/>
  <circle cx="10" cy="22" r="1.5" fill="#00A3FF"/>
  <!-- Top-right node (destination) -->
  <circle cx="22" cy="10" r="3.5" fill="#0B0C10" stroke="#E6B325" stroke-width="1.8"/>
  <circle cx="22" cy="10" r="1.5" fill="#E6B325"/>
  <!-- Centre dot -->
  <circle cx="16" cy="16" r="1.2" fill="#F8F9FA" opacity="0.6"/>
  <!-- Wordmark -->
  <text x="36" y="21" font-family="'Inter','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="16" font-weight="300" fill="#E6B325" letter-spacing="2.5">verak</text>
</svg>
